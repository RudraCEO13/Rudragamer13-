<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T20 World Cup Celebration</title>
    <style>
        :root {
            --india-saffron: #FF9933;
            --india-white: #FFFFFF;
            --india-green: #138808;
            --india-blue: #000080;
            --bg-dark: #1a1a2e;
            --bg-gradient: radial-gradient(circle, #1a1a2e 0%, #0f0f1b 100%);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
        }

        h1 {
            color: var(--india-white);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
            animation: fadeInDown 1.5s ease-out;
        }

        .highlight {
            display: block;
            font-size: 4rem;
            background: linear-gradient(to bottom, var(--india-saffron) 33%, var(--india-white) 33% 66%, var(--india-green) 66%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            letter-spacing: 5px;
            margin-bottom: 10px;
            animation: fadeInDown 1.5s ease-out;
        }

        .trophy-box {
            position: relative;
            height: 120px;
            margin-top: 50px;
        }

        .trophy {
            font-size: 80px;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 20px gold);
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -10%;
            animation: fall 4s linear infinite;
        }

        .status {
            color: var(--india-white);
            font-size: 1.2rem;
            opacity: 0.8;
            margin-top: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes fadeInDown {
            0% { opacity: 0; transform: translateY(-50px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.1); }
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Congratulation team</h1>
        <span class="highlight">INDIA</span>
        
        <div class="trophy-box">
            <div class="trophy">🏆</div>
        </div>

        <p class="status">T20 WORLD CUP 2026</p>

        <script>
            const colors = ['#FF9933', '#FFFFFF', '#138808'];
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 4 + 's';
                confetti.style.opacity = Math.random();
                document.body.appendChild(confetti);
            }
        </script>
    </div>

</body>
</html>
